<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seckinger Jaguars 9U</title>
<style>
    /* Keeping your original styles exactly as they were */
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
    .header { text-align: center; padding: 20px; border-bottom: 2px solid #008080; }
    .nav { display: flex; justify-content: space-around; margin: 20px 0; }
    .nav button { background: #008080; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
    .tab-content { display: none; }
    .active { display: block; }
    .card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #b38f34; }
    .coach-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    h2 { color: #b38f34; }
</style>
</head>
<body>

<div class="header">
    <h1>SECKINGER JAGUARS 9U</h1>
</div>

<div class="nav">
    <button onclick="showTab('roster')">Roster</button>
    <button onclick="showTab('schedule')">Schedule</button>
    <button onclick="showTab('events')">Events</button>
</div>

<div id="roster" class="tab-content active">
    <h2>Player Roster</h2>
    <div class="card">#1 Player Name - QB</div>
    <div class="card">#5 Player Name - RB</div>
    
    <div class="coach-section">
        <h2>Coaching Staff</h2>
        <div class="card">Dez Southward - Head Coach</div>
        <div class="card">Coach Name - Assistant</div>
    </div>
</div> <div id="schedule" class="tab-content">
    <h2>Game Schedule</h2>
    <div class="card">Sept 1st vs Opponent - Away</div>
    <div class="card">Sept 8th vs Opponent - Home</div>
</div>

<div id="events" class="tab-content">
    <h2>Team Events</h2>
    <div class="card">Practice: Tue/Thu @ 6:00PM</div>
    <div class="card">Parent Meeting: Friday @ 5:30PM</div>
</div>

<script>
    function showTab(tabId) {
        // Hide all tabs
        var contents = document.getElementsByClassName('tab-content');
        for (var i = 0; i < contents.length; i++) {
            contents[i].classList.remove('active');
        }
        // Show the clicked tab
        document.getElementById(tabId).classList.add('active');
    }
</script>

</body>
</html>
